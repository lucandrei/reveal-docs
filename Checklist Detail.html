<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Reveal — New user onboarding</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{--bg:#F4F4F5;--card:#fff;--border:#E8E8EB;--border-strong:#DCDCE0;--text:#18181B;--text-2:#52525B;--text-3:#A1A1AA;--accent:oklch(0.64 0.18 28);--accent-soft:oklch(0.96 0.04 28);--pos:oklch(0.64 0.14 150);--neg:oklch(0.62 0.17 25);--draft:oklch(0.65 0.12 75);}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-feature-settings:"cv11","ss01";}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px rgba(24,24,27,.04);}
.hairline{border-color:var(--border);}
.chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:999px;display:inline-block;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;white-space:nowrap;cursor:pointer;}
.btn:hover{background:#FAFAFA;border-color:var(--border-strong);}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);} .btn-primary:hover{background:#000;}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);} .btn-accent:hover{filter:brightness(.96);}
.btn-danger{color:var(--neg);border-color:oklch(0.9 0.08 25);} .btn-danger:hover{background:oklch(0.97 0.03 25);}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13.5px;color:var(--text-2);font-weight:500;cursor:pointer;transition:all .12s;}
.nav-item:hover{background:#F4F4F5;color:var(--text);} .nav-item.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(24,24,27,.06);border:1px solid var(--border);}
.tab{padding:8px 12px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--text);border-color:var(--text);}
.switch{width:32px;height:18px;border-radius:999px;background:#D4D4D8;position:relative;transition:.15s;flex-shrink:0;cursor:pointer;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:999px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.switch.on{background:var(--text);} .switch.on::after{left:16px;}
.radio{width:16px;height:16px;border:1.5px solid #C4C4C8;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.radio.on{border-color:var(--text);} .radio.on::after{content:"";width:8px;height:8px;background:var(--text);border-radius:999px;}
.mono{font-feature-settings:"tnum";}
.mock-code{font-family:ui-monospace,Menlo,monospace;font-size:12px;}
.drag-handle{cursor:grab;} .drag-handle:active{cursor:grabbing;}
::-webkit-scrollbar{width:10px;} ::-webkit-scrollbar-thumb{background:#D4D4D8;border-radius:10px;border:2px solid var(--bg);}
@keyframes pulseRec{0%,100%{opacity:1;}50%{opacity:.4;}} .rec{animation:pulseRec 1.4s ease-in-out infinite;}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useMemo} = React;

const Icon = ({d,size=16,sw=1.6,fill="none"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>);
const I={
  home:<Icon d={<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></>}/>,
  guides:<Icon d={<><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 14l4 2.5L8 19z" fill="currentColor" stroke="none"/></>}/>,
  checklist:<Icon d={<><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 10h10"/><path d="M7 14h6"/><path d="M15 14l1.5 1.5L19 12"/></>}/>,
  settings:<Icon d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.3 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.3l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1A2 2 0 1 1 19.7 7l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></>}/>,
  ext:<Icon d={<><path d="M4 4h7v7H4z"/><path d="M13 4h7v7h-7z"/><path d="M4 13h7v7H4z"/><circle cx="16.5" cy="16.5" r="3.5"/></>}/>,
  search:<Icon d={<><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>}/>,
  chev:<Icon d={<path d="m6 9 6 6 6-6"/>}/>,

  plus:<Icon d={<><path d="M12 5v14"/><path d="M5 12h14"/></>}/>,
  back:<Icon d={<path d="m15 6-6 6 6 6"/>}/>,
  up:<Icon d={<path d="m18 15-6-6-6 6"/>} size={14} sw={2}/>,
  down:<Icon d={<path d="m6 9 6 6 6-6"/>} size={14} sw={2}/>,
  trash:<Icon d={<><path d="M4 7h16"/><path d="M6 7v13h12V7"/><path d="M9 7V4h6v3"/></>} size={14}/>,
  copy:<Icon d={<><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></>} size={14}/>,
  link:<Icon d={<><path d="M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></>} size={14}/>,
  grip:<Icon d={<><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></>} size={14}/>,
  eye:<Icon d={<><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></>} size={14}/>,
  flag:<Icon d={<><path d="M4 21V4"/><path d="M4 4h12l-2 4 2 4H4"/></>} size={14}/>,
  clock:<Icon d={<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>} size={14}/>,
  sparkle:<Icon d={<><path d="M12 3v4"/><path d="M12 17v4"/><path d="M3 12h4"/><path d="M17 12h4"/></>} size={14}/>,
  user:<Icon d={<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></>} size={14}/>,
  extOpen:<Icon d={<><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></>} size={14}/>,
  globe:<Icon d={<><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c3 3 3 15 0 18-3-3-3-15 0-18z"/></>} size={14}/>,
  warn:<Icon d={<><path d="M12 3 2 20h20z"/><path d="M12 10v5"/><circle cx="12" cy="17.5" r=".5" fill="currentColor"/></>} size={12}/>,
  check:<Icon d={<path d="m5 12 5 5L20 7"/>} size={14} sw={2}/>,
  widget:<Icon d={<><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2v5"/><path d="M8 2v5"/><path d="M2 12h20"/><path d="M7 16h2"/><path d="M11 16h2"/><path d="M15 16h2"/></>} size={14}/>,
};

const Bubble = ({seed=0,size=32,initials})=>{
  const P=[["#F4C89A","#E5876B"],["#B8D4E3","#6B8FA6"],["#D4C5E8","#8B72B8"],["#9AD4B8","#5A9E7C"],["#F0B8C4","#C96B84"],["#E8D79C","#B89A4E"],["#C4D4E8","#7A8FA6"],["#D8C4A8","#9E7E5A"]];
  const [a,b]=P[seed%P.length]; const id=`bb${seed}${size}`;
  return(<svg width={size} height={size} viewBox="0 0 40 40" className="rounded-full block flex-shrink-0">
    <defs><radialGradient id={id} cx=".4" cy=".35" r=".8"><stop offset="0" stopColor={a}/><stop offset="1" stopColor={b}/></radialGradient></defs>
    <circle cx="20" cy="20" r="20" fill={`url(#${id})`}/>
    <circle cx="20" cy="16" r="5.2" fill="rgba(255,255,255,.45)"/>
    <path d="M9 34c2-5 6-7.5 11-7.5S29 29 31 34" fill="rgba(255,255,255,.45)"/>
    {initials&&<text x="20" y="23" textAnchor="middle" fontFamily="Inter" fontWeight="600" fontSize="11" fill="rgba(24,24,27,.55)">{initials}</text>}
  </svg>);
};

const GuidePoster = ({seed,size=40})=>{
  const bgs=[["#FDF7EC","#F3E1BF"],["#EEF3FB","#D8E4F4"],["#F3ECFB","#DDCEF0"],["#ECF7F1","#CDE5D7"],["#FBECEF","#F2CDD5"],["#FAF4E0","#EADEA9"],["#F0F4F9","#D6DEE8"],["#F6F1EB","#E2D4C1"]];
  const [a,b]=bgs[seed%bgs.length];
  return <div className="rounded-md shrink-0 relative overflow-hidden" style={{width:size,height:Math.round(size*.625),background:`linear-gradient(135deg,${a} 0%,${b} 100%)`}}>
    <div className="absolute bottom-0.5 right-0.5"><Bubble seed={seed} size={10} initials="AK"/></div>
  </div>;
};

/* ── Sidebar ── */
const Sidebar = ()=>(
  <aside className="w-[244px] shrink-0 px-3 py-3 flex flex-col" style={{height:"100vh",position:"sticky",top:0}}>
    <button className="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-white text-left w-full">
      <div className="w-7 h-7 rounded-md flex items-center justify-center text-white" style={{background:"var(--text)"}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.2" fill="currentColor"/></svg>
      </div>
      <div className="flex-1 min-w-0"><div className="text-[13px] font-semibold truncate">Figmark Studio</div><div className="text-[11px] mono" style={{color:"var(--text-3)"}}>figmark · Pro</div></div>
      <span style={{color:"var(--text-3)"}}>{I.chev}</span>
    </button>
    <div className="mt-3 relative">
      <span className="absolute left-2.5 top-1/2 -translate-y-1/2" style={{color:"var(--text-3)"}}>{I.search}</span>
      <input placeholder="Search guides…" className="w-full bg-white border hairline rounded-lg pl-8 pr-3 py-2 text-[13px] outline-none"/>
    </div>
    <nav className="mt-3 flex flex-col gap-0.5">
      <a href="Home.html" className="nav-item">{I.home}<span>Home</span></a>
      <a href="Guides.html" className="nav-item">{I.guides}<span>Guides</span><span className="ml-auto mono text-[10.5px]" style={{color:"var(--text-3)"}}>12</span></a>
      <a href="Checklist.html" className="nav-item active">{I.checklist}<span>Checklists</span></a>
      <a href="Settings.html" className="nav-item">{I.settings}<span>Settings</span></a>
    </nav>
    <div className="mt-4 px-2 text-[10.5px] mono uppercase tracking-wider" style={{color:"var(--text-3)"}}>Pinned</div>
    <nav className="mt-1 flex flex-col gap-0.5">
      <div className="nav-item" style={{background:"#fff",border:"1px solid var(--border)"}}><span className="w-1.5 h-1.5 rounded-full" style={{background:"var(--pos)"}}/><span>Onboarding checklist</span></div>
      <div className="nav-item"><span className="w-1.5 h-1.5 rounded-full" style={{background:"var(--draft)"}}/><span>Advanced features</span></div>
    </nav>
    <div className="mt-auto flex flex-col gap-2">
      <div className="card p-3">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-md flex items-center justify-center" style={{background:"var(--accent-soft)",color:"var(--accent)"}}>{I.ext}</div>
          <div className="flex-1"><div className="text-[12.5px] font-semibold">Reveal for Chrome</div><div className="text-[11px]" style={{color:"var(--text-2)"}}>Connected · v2.4.1</div></div>
        </div>
        <button className="btn w-full mt-2.5 justify-center text-[12.5px]">Open editor</button>
      </div>
      <div className="flex items-center gap-2 px-1.5 py-1.5">
        <Bubble seed={7} size={28} initials="AK"/>
        <div className="flex-1 min-w-0"><div className="text-[12.5px] font-medium truncate">Alex Kowalski</div><div className="text-[11px] mono truncate" style={{color:"var(--text-3)"}}>alex@figmark.co</div></div>
        <button className="p-1 rounded hover:bg-zinc-100" style={{color:"var(--text-3)"}}>{I.dots}</button>
      </div>
    </div>
  </aside>
);

/* ── Data ── */
const INITIAL_GUIDES = [
  {id:1,title:"Get started with Acme",steps:8,completion:78,completionInList:72,starts:3840,seed:0,drop:null},
  {id:2,title:"Set up your workspace",steps:5,completion:84,completionInList:61,starts:2780,seed:1,drop:null},
  {id:3,title:"Invite your team",steps:4,completion:67,completionInList:54,starts:2100,seed:2,drop:null},
  {id:4,title:"Connect your first integration",steps:6,completion:41,completionInList:38,starts:1540,seed:3,drop:2},
];

/* ── KPI card ── */
const Kpi = ({label,value,sub,delta,deltaKind,icon})=>(
  <div className="card p-4">
    <div className="text-[11px] mono uppercase tracking-wider flex items-center gap-1.5" style={{color:"var(--text-3)"}}>{icon}{label}</div>
    <div className="flex items-end gap-1.5 mt-2">
      <div className="text-[24px] font-semibold mono" style={{letterSpacing:"-.02em"}}>{value}</div>
      {sub && <div className="text-[12px] pb-0.5" style={{color:"var(--text-3)"}}>{sub}</div>}

    {delta && <div className="mt-2 chip" style={{background: deltaKind==="pos"?"oklch(0.96 0.05 150)":"oklch(0.97 0.03 25)",color: deltaKind==="pos"?"var(--pos)":"var(--neg)"}}>
      <span className="mono">{delta}</span>
    </div>}

);

/* ── Hero ── */
const Hero = ({published,setPublished})=>(
  <div className="card p-5 flex gap-5 items-start">
    {/* checklist icon */}
    <div className="w-[120px] h-[75px] rounded-lg shrink-0 flex items-center justify-center relative overflow-hidden" style={{background:"linear-gradient(135deg,#F4F4F5 0%,#E4E4E7 100%)"}}>
      <div className="flex flex-col gap-1.5 px-3 w-full">
        {[78,61,54,38].map((w,i)=>(
          <div key={i} className="flex items-center gap-2">

            </div>
            <div className="flex-1 h-1.5 rounded-full bg-zinc-200 overflow-hidden">
              <div className="h-full rounded-full" style={{width:`${w}%`,background: i===0?"var(--text)":"#C4C4C8"}}/>
            </div>
          </div>
        ))}
      </div>
      <div className="absolute bottom-1.5 right-1.5 flex -space-x-1">
        <Bubble seed={0} size={14} initials="AK"/>
        <Bubble seed={1} size={14} initials="MR"/>
        <Bubble seed={2} size={14} initials="JS"/>
      </div>
    </div>
    <div className="flex-1 min-w-0">
      <div className="flex items-center gap-2 text-[12.5px]" style={{color:"var(--text-3)"}}>
        <a href="Checklist.html" className="hover:text-zinc-900">Checklists</a>
        <span>/</span>
        <span style={{color:"var(--text)"}}>New user onboarding</span>
      </div>
      <div className="flex items-center gap-3 mt-1">
        <h1 className="text-[24px] font-semibold" style={{letterSpacing:"-.02em"}}>New user onboarding</h1>
        <span className="chip" style={{background: published?"oklch(0.96 0.05 150)":"oklch(0.97 0.03 75)",color: published?"var(--pos)":"var(--draft)"}}>
          <span className="dot" style={{background: published?"var(--pos)":"var(--draft)"}}/>{published?"Published":"Draft"}
        </span>
      </div>
      <div className="mt-1 text-[12.5px]" style={{color:"var(--text-2)"}}>Walk new signups through everything they need to be productive on day one.</div>
      <div className="mt-1.5 flex items-center gap-2 text-[12.5px]" style={{color:"var(--text-2)"}}>
        <Bubble seed={0} size={16} initials="AK"/>
        <span>Alex Kowalski</span><span>·</span>
        <span>4 guides · target: New users</span><span>·</span>
        <span>Updated 2h ago</span>
      </div>
      <div className="mt-4 flex items-end gap-5">
        <div><div className="text-[10.5px] mono uppercase tracking-wider" style={{color:"var(--text-3)"}}>Starts</div><div className="text-[18px] font-semibold mono" style={{letterSpacing:"-.02em"}}>3,840</div></div>
        <div><div className="text-[10.5px] mono uppercase tracking-wider" style={{color:"var(--text-3)"}}>Full completion</div><div className="text-[18px] font-semibold mono" style={{letterSpacing:"-.02em",color:"var(--pos)"}}>38%</div></div>
        <div><div className="text-[10.5px] mono uppercase tracking-wider" style={{color:"var(--text-3)"}}>Avg. time to finish</div><div className="text-[18px] font-semibold mono" style={{letterSpacing:"-.02em"}}>4d 2h</div></div>
        <div><div className="text-[10.5px] mono uppercase tracking-wider" style={{color:"var(--text-3)"}}>Guides</div><div className="text-[18px] font-semibold mono" style={{letterSpacing:"-.02em"}}>4</div></div>
        <div className="ml-auto flex items-center gap-2">
          <button onClick={()=>setPublished(!published)} className="btn">{published?"Unpublish":"Publish"}</button>
          <button className="btn">{I.copy}Duplicate</button>
          <button className="btn btn-accent">{I.plus}Add guide</button>
        </div>
      </div>
    </div>
  </div>
);

/* ── Tabs ── */
const Tabs = ({active,setActive})=>(
  <div className="flex items-center border-b hairline sticky top-0 z-20 -mx-6 px-6" style={{background:"var(--bg)"}}>
    {[{id:"overview",l:"Overview"},{id:"guides",l:"Guides",n:4},{id:"embed",l:"Embed"},{id:"behavior",l:"Behavior"}].map(t=>(
      <div key={t.id} onClick={()=>setActive(t.id)} className={"tab " + (active===t.id?"active":"")}>
        {t.l}{t.n && <span className="mono text-[11px] ml-1" style={{color:"var(--text-3)"}}>{t.n}</span>}
      </div>
    ))}
  </div>
);

/* ── OVERVIEW TAB ── */
const OverviewTab = ()=>{
  const guides = INITIAL_GUIDES;
  const W=900, H=200, pad={l:40,r:16,t:12,b:28};
  const xs = guides.map((g,i)=> pad.l + (i/(guides.length-1||1))*(W-pad.l-pad.r));
  const ys = guides.map(g=> pad.t + (H-pad.t-pad.b)*(1 - g.completionInList/100));
  const path = xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
  const area = `M ${xs[0]} ${H-pad.b} ` + xs.map((x,i)=>`L ${x} ${ys[i]}`).join(" ") + ` L ${xs[xs.length-1]} ${H-pad.b} Z`;

  return (
    <div className="flex flex-col gap-5">
      {/* KPIs */}
      <div className="grid grid-cols-5 gap-4">
        <Kpi label="Starts"          value="3,840"  delta="+8.4%" deltaKind="pos" icon={I.user}/>

const GuidesTab = ()=>{

    const j = i+dir;
    if(j<0||j>=guides.length) return;
    const next=[...guides];
    [next[i],next[j]]=[next[j],next[i]];
    setGuides(next);
  };
  const remove = (id) => setGuides(g=>g.filter(x=>x.id!==id));

  return (
    <div className="card">
      <div className="flex items-center justify-between px-5 py-4 border-b hairline">
        <div>
          <h3 className="text-[15px] font-semibold">Guides in this checklist</h3>

        <div/>
        <div>#</div>
        <div>Guide</div>
        <div>Steps</div>
        <div>Impressions</div>
        <div>Completion</div>
        <div>Status in list</div>
        <div/>
      </div>

      {guides.map((g,i)=>(
        <div key={g.id} className="grid grid-cols-[32px_40px_minmax(0,2fr)_100px_110px_80px_120px_80px] gap-3 px-5 py-3 items-center border-b hairline last:border-0 hover:bg-[#FAFAFA] group">
          {/* drag handle */}
          <div className="drag-handle text-zinc-300 group-hover:text-zinc-400 flex items-center">{I.grip}</div>

          {/* order number */}
          <div className="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-semibold" style={{background:"var(--text)",color:"#fff"}}>{i+1}</div>

          {/* title */}
          <div className="flex items-center gap-3 min-w-0">
            <GuidePoster seed={g.seed} size={44}/>
            <div className="min-w-0">
              <a href="Guide Detail.html" className="text-[13.5px] font-medium truncate block hover:underline" style={{color:"var(--text)"}}>{g.title}</a>
              <div className="text-[11.5px] mono mt-0.5" style={{color:"var(--text-3)"}}>{g.steps} steps</div>
            </div>
          </div>

          <div className="text-[13px] mono" style={{color:"var(--text-2)"}}>{g.steps} steps</div>
          <div className="text-[13px] mono" style={{color:"var(--text-2)"}}>{g.starts.toLocaleString()}</div>

          {/* completion bar */}
          <div>
            <div className="h-1.5 rounded-full bg-zinc-100 overflow-hidden">
              <div className="h-full rounded-full" style={{width:`${g.completionInList}%`,background: g.completionInList>=70?"var(--pos)":g.completionInList>=50?"var(--draft)":"var(--neg)"}}/>
            </div>
            <div className="text-[11px] mono mt-0.5" style={{color:"var(--text-3)"}}>{g.completionInList}%</div>
          </div>

          {/* status in list */}
          {g.drop
            ? <span className="chip" style={{background:"oklch(0.97 0.03 25)",color:"var(--neg)",fontSize:11}}>{I.warn}Leaks step {g.drop}</span>
            : <span className="chip" style={{background:"oklch(0.96 0.05 150)",color:"var(--pos)",fontSize:11}}>{I.check}Healthy</span>}

          {/* actions */}
          <div className="flex items-center gap-1">
            <button onClick={()=>move(i,-1)} disabled={i===0} className={"p-1.5 rounded hover:bg-white " + (i===0?"opacity-20 pointer-events-none":"")} style={{color:"var(--text-3)"}}>{I.up}</button>

        <div className="py-16 text-center">

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
