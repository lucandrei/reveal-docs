    <circle cx="12" cy="12" r="10" fill={c} fillOpacity=".18" stroke={c} strokeWidth="1.5"/>
    {kind==="sad"&&<><circle cx="9" cy="10" r="1" fill={c}/><circle cx="15" cy="10" r="1" fill={c}/><path d="M8.5 16c1-1.2 2.2-1.8 3.5-1.8s2.5.6 3.5 1.8" stroke={c} strokeWidth="1.5" fill="none" strokeLinecap="round"/></>}

    {kind==="happy"&&<><circle cx="9" cy="10" r="1" fill={c}/><circle cx="15" cy="10" r="1" fill={c}/><path d="M8.5 14c1 1.2 2.2 1.8 3.5 1.8s2.5-.6 3.5-1.8" stroke={c} strokeWidth="1.5" fill="none" strokeLinecap="round"/></>}
    {kind==="love"&&<><path d="M7.5 9.5c0-1 .8-1.8 1.8-1.8.7 0 1.2.4 1.5.9.3-.5.8-.9 1.5-.9 1 0 1.8.8 1.8 1.8 0 1.6-2.3 3-3.3 3.5-1-.5-3.3-1.9-3.3-3.5z" fill={c}/><path d="M8 14c1 1 2.5 1.6 4 1.6s3-.6 4-1.6" stroke={c} strokeWidth="1.5" fill="none" strokeLinecap="round"/></>}
  </svg>);
};

const Bubble = ({seed=1,size=36,live=false,initials})=>{
  const palettes=[["#F4C89A","#E5876B"],["#B8D4E3","#6B8FA6"],["#D4C5E8","#8B72B8"],["#9AD4B8","#5A9E7C"],["#F0B8C4","#C96B84"],["#E8D79C","#B89A4E"],["#C4D4E8","#7A8FA6"],["#D8C4A8","#9E7E5A"]];
  const [a,b]=palettes[seed%palettes.length]; const id=`bg${seed}`;
  return(<div className="relative inline-block" style={{width:size,height:size}}>
    <svg width={size} height={size} viewBox="0 0 40 40" className="rounded-full" style={{display:"block"}}>
      <defs><radialGradient id={id} cx="0.4" cy="0.35" r="0.8"><stop offset="0" stopColor={a}/><stop offset="1" stopColor={b}/></radialGradient></defs>
      <circle cx="20" cy="20" r="20" fill={`url(#${id})`}/>
      <circle cx="20" cy="16" r="5.2" fill="rgba(255,255,255,0.45)"/>
      <path d="M9 34c2-5 6-7.5 11-7.5S29 29 31 34" fill="rgba(255,255,255,0.45)"/>
      {initials&&<text x="20" y="23" textAnchor="middle" fontFamily="Inter" fontWeight="600" fontSize="11" fill="rgba(24,24,27,0.55)">{initials}</text>}
    </svg>
    {live&&<span className="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full" style={{background:"var(--accent)",boxShadow:"0 0 0 2px #fff"}}/>}
  </div>);
};

const Spark = ({data,stroke="#18181B",fill=false,height=32,width=96})=>{
  const max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>{const x=(i/(data.length-1))*width;const y=height-((v-min)/(max-min||1))*(height-4)-2;return[x,y];});
  const path=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=path+` L ${width} ${height} L 0 ${height} Z`;
  return(<svg width={width} height={height}>
    {fill&&<path d={area} fill={stroke} opacity="0.08"/>}
    <path d={path} fill="none" stroke={stroke} strokeWidth="1.5" strokeLinecap="round"/>
  </svg>);
};

        <h3 className="text-[15px] font-semibold">Recent guides</h3>
        <div className="text-[12.5px]" style={{color:"var(--text-2)"}}>Last edited across your workspace</div>
      </div>
      <div className="flex items-center gap-2">
        <button className="btn"><span>{I.plus}</span>New guide</button>
        <a href="Guides.html" className="btn">All guides {I.chevR}</a>
      </div>
    </div>
    <div className="grid grid-cols-[minmax(0,2.4fr)_90px_110px_1fr_110px_90px_36px] gap-4 px-5 py-2.5 text-[10.5px] mono uppercase tracking-wider border-b hairline" style={{color:"var(--text-3)",background:"#FAFAFA"}}>
      <div>Guide</div><div>Steps</div><div>Impressions</div><div>Completion</div><div>Rating</div><div>Updated</div><div/>
    </div>
    <div>
      {recentGuides.map((g,i)=>(
        <div key={g.id} className="grid grid-cols-[minmax(0,2.4fr)_90px_110px_1fr_110px_90px_36px] gap-4 px-5 py-3 items-center border-b hairline last:border-0 hover:bg-[#FAFAFA] group">
          <div className="flex items-center gap-3 min-w-0">
            <div className="relative">
              <Bubble seed={g.seed} size={34} initials={g.initials}/>
              <div className="absolute -bottom-0.5 -right-0.5 w-4 h-4 rounded-full bg-white flex items-center justify-center border hairline"><span style={{color:"var(--text)"}}>{I.play}</span></div>
            </div>
            <div className="min-w-0">
              <div className="text-[13.5px] font-medium truncate">{g.title}</div>
              <div className="mt-0.5"><StatusChip s={g.status}/></div>
            </div>
          </div>
          <div className="text-[13px] mono" style={{color:"var(--text-2)"}}>{g.steps}</div>
          <div className="text-[13px] mono" style={{color:"var(--text-2)"}}>{g.impressions}</div>
          <div>
            {g.completion!==null?(
              <div className="flex items-center gap-2">
                <div className="flex-1 h-1.5 rounded-full bg-zinc-100 overflow-hidden max-w-[140px]">
                  <div className="h-full rounded-full" style={{width:`${g.completion}%`,background:g.completion>=70?"var(--pos)":g.completion>=50?"var(--draft)":"var(--neg)"}}/>
                </div>
                <div className="mono text-[12.5px] w-10">{g.completion}%</div>
              </div>
            ):<span className="mono text-[12px]" style={{color:"var(--text-3)"}}>—</span>}
          </div>
          <div>{g.rating?<Face kind={g.rating} size={20}/>:<span className="mono text-[12px]" style={{color:"var(--text-3)"}}>—</span>}</div>
          <div className="text-[12.5px]" style={{color:"var(--text-2)"}}>{g.updated}</div>
          <button className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-white" style={{color:"var(--text-3)"}}>{I.dots}</button>
        </div>
      ))}
    </div>
  </div>
);

const FeedbackCard = ()=>(
  <div className="card p-5">
    <div className="flex items-center justify-between mb-3">
      <div>
        <h3 className="text-[15px] font-semibold">Latest feedback</h3>
        <div className="text-[12.5px]" style={{color:"var(--text-2)"}}>From users who finished a guide</div>
      </div>
      <button className="text-[12.5px] flex items-center gap-0.5" style={{color:"var(--text-2)"}}>View all {I.chevR}</button>
    </div>
    <div className="flex flex-col gap-2.5">
      {feedbackData.map((f,i)=>(
        <div key={i} className="p-3 rounded-lg border hairline flex items-start gap-3" style={{background:"#FAFAFA"}}>
          <Face kind={f.rating} size={22}/>
          <div className="flex-1 min-w-0">
            <div className="text-[13px]" style={{color:"var(--text)"}}>"{f.text}"</div>
            <div className="mt-1 flex items-center gap-2 text-[11.5px] mono" style={{color:"var(--text-3)"}}>
              <span className="truncate">{f.user}</span><span>·</span>
              <span className="truncate" style={{color:"var(--text-2)"}}>{f.guide}</span>
              <span className="ml-auto">{f.when}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  </div>
);

const App = ()=>(
  <div className="min-h-screen flex">
    <Sidebar/>
    <main className="flex-1 min-w-0 py-6 pr-6">
      <div className="max-w-[1180px] mx-auto px-6 flex flex-col gap-5">
        {/* Header */}
        <div className="flex items-start justify-between">
          <div>
            <h1 className="text-[28px] font-semibold num-tight">Good afternoon, Alex</h1>
            <div className="text-[13.5px] mt-1" style={{color:"var(--text-2)"}}>
              <span className="mono font-medium" style={{color:"var(--text)"}}>3 guides</span> gained traction this week.
              <span className="mono font-medium" style={{color:"var(--neg)"}}> 1 guide</span> is losing users at step 2.
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button className="btn"><span style={{color:"var(--text-3)"}}>{I.clock}</span>Last 14 days {I.chev}</button>
            <button className="btn"><span>{I.bell}</span></button>
            <button className="btn btn-primary"><span>{I.record}</span>New guide</button>
          </div>
        </div>

        {/* KPI row */}
        <div className="grid grid-cols-4 gap-4">
          <Kpi label="Impressions"     value="48,210" delta="+12.4%" deltaKind="pos" sparkData={[20,24,22,28,30,34,40,46]} icon={I.eye}/>
          <Kpi label="Guide starts"    value="10,480" delta="+14.2%" deltaKind="pos" sparkData={[12,14,16,20,24,26,30,34]} icon={I.play}/>
          <Kpi label="Completion rate" value="75.6%"  delta="+2.1pp" deltaKind="pos" sparkData={[60,62,64,68,70,72,74,76]} icon={I.flag}/>
          <Kpi label="Avg. rating"     value="4.3" sub="/ 5.0" delta="+0.2" deltaKind="pos" sparkData={[40,42,42,44,44,46,46,48]} icon={I.sparkle}/>
        </div>

        {/* Top / Worst */}
        <div className="grid grid-cols-2 gap-4">
          <PerformerCard kind="best" title="Get started with Acme" steps={8} completion={78} starts="4,210" rating="love" seed={0} note="Step 1 (founder intro) is rewatched 2.1× on average — personal video is clearly landing."/>
          <PerformerCard kind="worst" title="What's new in v4.2" steps={7} completion={41} starts="1,980" rating="neutral" seed={4} dropStep={2} note="23% drop at step 2. The highlighted element may have moved — try remapping it."/>
        </div>

        {/* Recent + feedback */}
        <div className="grid grid-cols-3 gap-4">
          <div className="col-span-2"><RecentGuides/></div>
          <FeedbackCard/>
        </div>

        <div className="flex items-center justify-between pt-2 pb-6 text-[11.5px] mono" style={{color:"var(--text-3)"}}>
          <div>Reveal · v2.4.1</div>
          <div className="flex items-center gap-3">
            <span className="flex items-center gap-1.5"><span className="dot" style={{background:"var(--pos)"}}/>All systems operational</span>
            <span>Docs</span><span>Changelog</span><span>Keyboard shortcuts ⌘/</span>
          </div>
        </div>
      </div>
    </main>
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
