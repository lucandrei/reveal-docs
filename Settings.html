<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Reveal — Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{--bg:#F4F4F5;--card:#fff;--border:#E8E8EB;--border-strong:#DCDCE0;--text:#18181B;--text-2:#52525B;--text-3:#A1A1AA;--accent:oklch(0.64 0.18 28);--accent-soft:oklch(0.96 0.04 28);--pos:oklch(0.64 0.14 150);--neg:oklch(0.62 0.17 25);--draft:oklch(0.65 0.12 75);}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-feature-settings:"cv11","ss01";}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px rgba(24,24,27,.04);}
.hairline{border-color:var(--border);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:#FAFAFA;border-color:var(--border-strong);}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);} .btn-primary:hover{background:#000;}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);} .btn-accent:hover{filter:brightness(.95);}
.btn-danger{background:#fff;color:var(--neg);border-color:oklch(0.9 0.08 25);} .btn-danger:hover{background:oklch(0.97 0.03 25);}
.input{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;color:var(--text);transition:border-color .15s;}
.input:focus{border-color:var(--text);}
.chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:999px;display:inline-block;}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13.5px;color:var(--text-2);font-weight:500;cursor:pointer;transition:all .12s;}
.nav-item:hover{background:#F4F4F5;color:var(--text);} .nav-item.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(24,24,27,.06);border:1px solid var(--border);}
.switch{width:32px;height:18px;border-radius:999px;background:#D4D4D8;position:relative;transition:.15s;flex-shrink:0;cursor:pointer;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:999px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.switch.on{background:var(--text);} .switch.on::after{left:16px;}
.stab{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .12s;}
.stab:hover{background:#F0F0F1;color:var(--text);} .stab.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(24,24,27,.06);border:1px solid var(--border);}
.avatar{width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;}
.divider{height:1px;background:var(--border);margin:0;}
::-webkit-scrollbar{width:10px;} ::-webkit-scrollbar-thumb{background:#D4D4D8;border-radius:10px;border:2px solid var(--bg);}
@keyframes pulseRec{0%,100%{opacity:1;}50%{opacity:.4;}} .rec{animation:pulseRec 1.4s ease-in-out infinite;}
.mono{font-feature-settings:"tnum";}
.danger-zone{border:1px solid oklch(0.9 0.08 25);background:oklch(0.99 0.01 25);border-radius:14px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;

/* ── Icons ── */
const Ic = ({d,size=16,sw=1.6,fill="none"})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const I={
  home:<Ic d={<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></>}/>,
  guides:<Ic d={<><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 14l4 2.5L8 19z" fill="currentColor" stroke="none"/></>}/>,
  checklist:<Ic d={<><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 10h10"/><path d="M7 14h6"/><path d="M15 14l1.5 1.5L19 12"/></>}/>,
  settings:<Ic d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.3 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.3l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1A2 2 0 1 1 19.7 7l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></>}/>,
  ext:<Ic d={<><path d="M4 4h7v7H4z"/><path d="M13 4h7v7h-7z"/><path d="M4 13h7v7H4z"/><circle cx="16.5" cy="16.5" r="3.5"/></>}/>,
  search:<Ic d={<><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>}/>,
  chev:<Ic d={<path d="m6 9 6 6 6-6"/>}/>,
  dots:<Ic d={<><circle cx="5" cy="12" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/><circle cx="19" cy="12" r="1.4" fill="currentColor"/></>}/>,
  plus:<Ic d={<><path d="M12 5v14"/><path d="M5 12h14"/></>}/>,
  check:<Ic d={<path d="m5 12 5 5L20 7"/>} sw={2}/>,
  copy:<Ic d={<><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></>} size={14}/>,
  trash:<Ic d={<><path d="M4 7h16"/><path d="M6 7v13h12V7"/><path d="M9 7V4h6v3"/></>} size={14}/>,
  upload:<Ic d={<><path d="M12 15V3"/><path d="m7 8 5-5 5 5"/><path d="M5 21h14"/></>} size={14}/>,
  link:<Ic d={<><path d="M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></>} size={14}/>,
  refresh:<Ic d={<><path d="M3 12a9 9 0 0 1 15-6.7L21 9"/><path d="M21 3v6h-6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 15"/><path d="M3 21v-6h6"/></>} size={14}/>,
  warn:<Ic d={<><path d="M12 3 2 20h20z"/><path d="M12 10v5"/><circle cx="12" cy="17.5" r=".5" fill="currentColor"/></>} size={13}/>,
  globe:<Ic d={<><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c3 3 3 15 0 18-3-3-3-15 0-18z"/></>} size={14}/>,
  user:<Ic d={<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></>} size={14}/>,
  lock:<Ic d={<><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></>} size={14}/>,
  bell:<Ic d={<><path d="M6 8a6 6 0 1 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></>} size={14}/>,
  key:<Ic d={<><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 8 11 18l-1.5-1.5"/><path d="M15 4l2 2"/><path d="m17 6 2 2"/></>} size={14}/>,
  zap:<Ic d={<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>} size={14}/>,
  chrome:<Ic d={<><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="9"/><path d="M12 8h9"/><path d="M12 8a4 4 0 0 0-3.46 6L5.07 20.5"/><path d="M12 8a4 4 0 0 1 3.46 6l-3.45 5.99"/></>} size={14}/>,
  credit:<Ic d={<><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></>} size={14}/>,
  building:<Ic d={<><path d="M3 22V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v16"/><path d="M3 22h18"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/><path d="M10 22v-4h4v4"/></>} size={14}/>,
  shield:<Ic d={<><path d="M12 3 4 7v5c0 5 4 9.5 8 11 4-1.5 8-6 8-11V7z"/><path d="m9 12 2 2 4-4"/></>} size={14}/>,
};

/* ── Bubble avatar ── */
const Bubble = ({seed=0,size=32,initials})=>{
  const P=[["#F4C89A","#E5876B"],["#B8D4E3","#6B8FA6"],["#D4C5E8","#8B72B8"],["#9AD4B8","#5A9E7C"],["#F0B8C4","#C96B84"],["#E8D79C","#B89A4E"],["#C4D4E8","#7A8FA6"],["#D8C4A8","#9E7E5A"]];
  const [a,b]=P[seed%P.length]; const id=`bbl${seed}${size}`;
  return(<svg width={size} height={size} viewBox="0 0 40 40" className="rounded-full block">
    <defs><radialGradient id={id} cx=".4" cy=".35" r=".8"><stop offset="0" stopColor={a}/><stop offset="1" stopColor={b}/></radialGradient></defs>
    <circle cx="20" cy="20" r="20" fill={`url(#${id})`}/>
    <circle cx="20" cy="16" r="5.2" fill="rgba(255,255,255,.45)"/>
    <path d="M9 34c2-5 6-7.5 11-7.5S29 29 31 34" fill="rgba(255,255,255,.45)"/>
    {initials&&<text x="20" y="23" textAnchor="middle" fontFamily="Inter" fontWeight="600" fontSize="11" fill="rgba(24,24,27,.55)">{initials}</text>}
  </svg>);
};

/* ── Layout sidebar (nav) ── */
const AppSidebar = ()=>(
  <aside className="w-[244px] shrink-0 px-3 py-3 flex flex-col" style={{height:"100vh",position:"sticky",top:0}}>
    <button className="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-white text-left w-full">
      <div className="w-7 h-7 rounded-md flex items-center justify-center text-white" style={{background:"var(--text)"}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.2" fill="currentColor"/></svg>
      </div>
      <div className="flex-1 min-w-0">
        <div className="text-[13px] font-semibold truncate">Figmark Studio</div>
        <div className="text-[11px] mono" style={{color:"var(--text-3)"}}>figmark · Pro</div>
      </div>
      <span style={{color:"var(--text-3)"}}>{I.chev}</span>
    </button>
    <div className="mt-3 relative">
      <span className="absolute left-2.5 top-1/2 -translate-y-1/2" style={{color:"var(--text-3)"}}>{I.search}</span>
      <input placeholder="Search guides…" className="w-full bg-white border hairline rounded-lg pl-8 pr-3 py-2 text-[13px] outline-none"/>
    </div>
    <nav className="mt-3 flex flex-col gap-0.5">
      <a href="Home.html" className="nav-item">{I.home}<span>Home</span></a>
      <a href="Guides.html" className="nav-item">{I.guides}<span>Guides</span><span className="ml-auto text-[10.5px] mono" style={{color:"var(--text-3)"}}>12</span></a>
      <a href="Checklist.html" className="nav-item">{I.checklist}<span>Checklists</span></a>
      <div className="nav-item active">{I.settings}<span>Settings</span></div>
    </nav>
    <div className="mt-auto flex flex-col gap-2">
      <div className="card p-3">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-md flex items-center justify-center" style={{background:"var(--accent-soft)",color:"var(--accent)"}}>{I.ext}</div>
          <div className="flex-1"><div className="text-[12.5px] font-semibold">Reveal for Chrome</div><div className="text-[11px]" style={{color:"var(--text-2)"}}>v2.4.1 — up to date</div></div>
        </div>
        <button className="btn w-full mt-2.5 justify-center text-[12.5px]">Open editor</button>
      </div>
      <div className="flex items-center gap-2 px-1.5 py-1.5">
        <Bubble seed={7} size={28} initials="AK"/>
        <div className="flex-1 min-w-0"><div className="text-[12.5px] font-medium truncate">Alex Kowalski</div><div className="text-[11px] mono truncate" style={{color:"var(--text-3)"}}>alex@figmark.co</div></div>
        <button className="p-1 rounded hover:bg-zinc-100" style={{color:"var(--text-3)"}}>{I.dots}</button>
      </div>
    </div>
  </aside>
);

/* ── Section nav (inner left rail) ── */
const SECTIONS = [
  {id:"workspace", label:"Workspace",    icon:I.building},
  {id:"team",      label:"Team",         icon:I.user},
  {id:"account",   label:"Account",      icon:I.shield},
  {id:"notifications", label:"Notifications", icon:I.bell},
  {id:"integrations",  label:"Integrations",  icon:I.zap},
  {id:"api",       label:"API & Webhooks", icon:I.key},
  {id:"extension", label:"Extension",    icon:I.chrome},
  {id:"billing",   label:"Billing",      icon:I.credit},
];

const SecNav = ({active, setActive})=>(
  <div className="w-[196px] shrink-0 pt-1 flex flex-col gap-0.5">
    {SECTIONS.map(s=>(
      <button key={s.id} onClick={()=>setActive(s.id)} className={"stab " + (active===s.id?"active":"")}>
        <span style={{color: active===s.id?"var(--text)":"var(--text-3)"}}>{s.icon}</span>
        <span>{s.label}</span>
      </button>
    ))}
    <div className="my-2 divider"/>
    <button className="stab" style={{color:"var(--neg)"}}>
      <Ic d={<><path d="M12 3 2 20h20z"/><path d="M12 10v5"/><circle cx="12" cy="17.5" r=".5" fill="currentColor"/></>} size={14}/>
      <span>Danger zone</span>
    </button>
  </div>
);

/* ── Reusable row ── */
const Row = ({label, hint, children, last})=>(
  <div className={`grid grid-cols-[220px_1fr] gap-8 py-5 ${last?"":"border-b hairline"}`}>
    <div>
      <div className="text-[13.5px] font-medium">{label}</div>
      {hint && <div className="text-[12px] mt-0.5" style={{color:"var(--text-3)"}}>{hint}</div>}
    </div>
    <div className="flex flex-col gap-2">{children}</div>
  </div>
);

const SectionCard = ({title, sub, children})=>(
  <div className="card p-6">
    <div className="mb-4">
      <h2 className="text-[16px] font-semibold">{title}</h2>
      {sub && <div className="text-[13px] mt-0.5" style={{color:"var(--text-2)"}}>{sub}</div>}
    </div>
    {children}
  </div>
);

/* ────────────────────────────────────────────────
   SECTIONS
─────────────────────────────────────────────── */

/* WORKSPACE */
const WorkspaceSection = ()=>{
  const [name,setName] = useState("Figmark Studio");
  const [domain,setDomain] = useState("app.acme.com");
  const [slug,setSlug] = useState("figmark");
  return (
    <div className="flex flex-col gap-5">
      <SectionCard title="Workspace settings" sub="General info for this workspace.">
        <Row label="Workspace name" hint="Visible to all team members.">
          <input className="input" value={name} onChange={e=>setName(e.target.value)}/>
        </Row>
        <Row label="Workspace logo">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-[18px]" style={{background:"var(--text)"}}>F</div>
            <button className="btn">{I.upload}<span>Upload logo</span></button>
            <span className="text-[12px]" style={{color:"var(--text-3)"}}>PNG or SVG, 64×64 min</span>
          </div>
        </Row>
        <Row label="Workspace URL" hint="Used for share links and embed references.">
          <div className="flex items-center gap-0 border hairline rounded-lg overflow-hidden">
            <div className="px-3 py-2 text-[13px] border-r hairline" style={{background:"#FAFAFA",color:"var(--text-3)"}}>reveal.so/</div>
            <input className="flex-1 px-3 py-2 text-[13px] outline-none" value={slug} onChange={e=>setSlug(e.target.value)}/>
          </div>
        </Row>
        <Row label="Site domain" hint="The domain your pixel is installed on." last>
          <div className="flex items-center gap-2">
            <input className="input" value={domain} onChange={e=>setDomain(e.target.value)}/>
            <span className="chip" style={{background:"oklch(0.96 0.05 150)",color:"var(--pos)"}}><span className="dot rec" style={{background:"var(--pos)"}}/>Verified</span>
          </div>
          <div className="text-[12px]" style={{color:"var(--text-3)"}}>Our Chrome extension confirms detection automatically.</div>
        </Row>
        <div className="flex justify-end pt-2">
          <button className="btn btn-primary">Save changes</button>
        </div>
      </SectionCard>
    </div>
  );
};

/* TEAM */
const MEMBERS = [
  {name:"Alex Kowalski",   email:"alex@figmark.co",   role:"Admin",   seed:7,  you:true,  joined:"Mar 1, 2026"},
  {name:"Maya Rodriguez",  email:"maya@figmark.co",   role:"Editor",  seed:2,  you:false, joined:"Mar 5, 2026"},
  {name:"Jordan Seto",     email:"jordan@figmark.co", role:"Editor",  seed:4,  you:false, joined:"Mar 12, 2026"},
  {name:"Chris Tanaka",    email:"chris@figmark.co",  role:"Viewer",  seed:5,  you:false, joined:"Apr 2, 2026"},
];
const roleColors = {Admin:{bg:"#F4F4F5",fg:"var(--text)"}, Editor:{bg:"oklch(0.96 0.04 28)",fg:"var(--accent)"}, Viewer:{bg:"oklch(0.97 0.03 75)",fg:"var(--draft)"}};

const TeamSection = ()=>{
  const [invite,setInvite] = useState("");

  return (
    <div className="flex flex-col gap-5">
      <SectionCard title="Invite a teammate" sub="Invited users get an email with a link to join this workspace.">

          <input className="input flex-1" placeholder="colleague@company.com" value={invite} onChange={e=>setInvite(e.target.value)}/>
          <div className="flex gap-1 p-0.5 rounded-lg border hairline bg-white text-[12.5px]">
            {["Admin","Editor","Viewer"].map(r=>(
              <button key={r} onClick={()=>setRole(r)} className={"px-2.5 py-1.5 rounded-md font-medium " + (role===r?"bg-zinc-900 text-white":"text-zinc-600 hover:bg-zinc-100")}>{r}</button>

      <SectionCard title="Members" sub={`${MEMBERS.length} people in Figmark Studio`}>

                {["Admin","Editor","Viewer"].map(r=>(
