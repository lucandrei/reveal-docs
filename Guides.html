    :root{
      --bg:#F4F4F5; --card:#FFFFFF; --border:#E8E8EB; --border-strong:#DCDCE0;
      --text:#18181B; --text-2:#52525B; --text-3:#A1A1AA;
      --accent:oklch(0.64 0.18 28);
      --accent-soft:oklch(0.96 0.04 28);
      --pos:oklch(0.64 0.14 150);
      --neg:oklch(0.62 0.17 25);
      --draft:oklch(0.65 0.12 75);
    }
    html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-feature-settings:"cv11","ss01";}
    .mono{font-feature-settings:"tnum","ss01";}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 0 rgba(24,24,27,.02),0 1px 2px rgba(24,24,27,.04);}
    .hairline{border-color:var(--border);}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;}
    .dot{width:6px;height:6px;border-radius:999px;display:inline-block;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;white-space:nowrap;cursor:pointer;}
    .btn:hover{background:#FAFAFA;border-color:var(--border-strong);}
    .btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
    .btn-primary:hover{background:#000;border-color:#000;}
    .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
    .btn-accent:hover{filter:brightness(.96);}
    .nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13.5px;color:var(--text-2);font-weight:500;cursor:pointer;transition:all .12s;}
    .nav-item:hover{background:#F4F4F5;color:var(--text);}
    .nav-item.active{background:#fff;color:var(--text);box-shadow:0 1px 0 rgba(24,24,27,.02),0 1px 2px rgba(24,24,27,.06);border:1px solid var(--border);}
    .num-tight{letter-spacing:-.02em;}
    .posterShadow{box-shadow:inset 0 -40px 60px rgba(0,0,0,.35);}
    .tab{padding:6px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .tab.active{background:#fff;color:var(--text);box-shadow:0 1px 0 rgba(24,24,27,.02),0 1px 2px rgba(24,24,27,.06);border:1px solid var(--border);}
    .chk{width:16px;height:16px;border:1.5px solid #C4C4C8;border-radius:4px;background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
    .chk.on{background:var(--text);border-color:var(--text);color:#fff;}
    ::-webkit-scrollbar{width:10px;height:10px;}
    ::-webkit-scrollbar-thumb{background:#D4D4D8;border-radius:10px;border:2px solid var(--bg);}
    @keyframes pulseRec{0%,100%{opacity:1;}50%{opacity:.4;}}
    .rec-dot{animation:pulseRec 1.4s ease-in-out infinite;}

/* ---------- VIDEO BUBBLE (small) ---------- */
const Bubble = ({seed=0, size=32, initials, live}) => {
  const palettes=[["#F4C89A","#E5876B"],["#B8D4E3","#6B8FA6"],["#D4C5E8","#8B72B8"],["#9AD4B8","#5A9E7C"],["#F0B8C4","#C96B84"],["#E8D79C","#B89A4E"],["#C4D4E8","#7A8FA6"],["#D8C4A8","#9E7E5A"]];
  const [a,b]=palettes[seed%palettes.length];
  const id=`bb${seed}-${size}`;
  return(
    <div className="relative inline-block" style={{width:size,height:size}}>
      <svg width={size} height={size} viewBox="0 0 40 40" className="rounded-full block">
        <defs><radialGradient id={id} cx=".4" cy=".35" r=".8"><stop offset="0" stopColor={a}/><stop offset="1" stopColor={b}/></radialGradient></defs>
        <circle cx="20" cy="20" r="20" fill={`url(#${id})`}/>
        <circle cx="20" cy="16" r="5.2" fill="rgba(255,255,255,.45)"/>
        <path d="M9 34c2-5 6-7.5 11-7.5S29 29 31 34" fill="rgba(255,255,255,.45)"/>
        {initials && <text x="20" y="23" textAnchor="middle" fontFamily="Inter" fontWeight="600" fontSize="11" fill="rgba(24,24,27,.55)">{initials}</text>}
      </svg>
      {live && <span className="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full" style={{background:"var(--accent)",boxShadow:"0 0 0 2px #fff"}}/>}
    </div>
  );
};

  return (
    <div className="relative rounded-t-[13px] overflow-hidden" style={{aspectRatio:"16/9",background:`linear-gradient(135deg,${a} 0%,${b} 100%)`}}>

      <div className="absolute top-[30%] left-[30%] px-2 py-1 rounded-md text-[10px] font-medium" style={{background:"#18181B",color:"#fff"}}>Step 2 · Try it</div>

/* ---------- STATUS CHIP ---------- */
const StatusChip = ({s, size="md"}) => {
  const map={
    published:{bg:"oklch(0.96 0.05 150)",fg:"var(--pos)",label:"Published",dot:"var(--pos)"},
    draft:{bg:"oklch(0.97 0.03 75)",fg:"var(--draft)",label:"Draft",dot:"var(--draft)"},
    archived:{bg:"#F4F4F5",fg:"var(--text-2)",label:"Archived",dot:"var(--text-3)"},
  }[s];
  return <span className="chip" style={{background:map.bg,color:map.fg,fontSize:size==="sm"?11:12}}><span className="dot" style={{background:map.dot}}/>{map.label}</span>;
};

/* ---------- GALLERY CARD ---------- */
const GalleryCard = ({g, selected, onSelect}) => {
  const isDraft = g.status==="draft";
  const isArchived = g.status==="archived";
  return (
  <div className={"card overflow-hidden flex flex-col group relative hover:shadow-md transition-shadow cursor-pointer " + (isDraft ? "is-draft" : "")} style={{
    borderColor:selected?"var(--text)":"var(--border)",
    borderStyle: isDraft ? "dashed" : "solid",
    background: isDraft ? "#FAFAF9" : "#FFFFFF",
  }}>
    <button onClick={(e)=>{e.stopPropagation();onSelect();}} className={"absolute top-2.5 left-2.5 z-10 chk " + (selected?"on":"") + (selected?"":" opacity-0 group-hover:opacity-100")} style={{transition:"opacity .15s"}}>
      {selected && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="m5 12 5 5L20 7"/></svg>}
    </button>

    <div className="relative" style={{filter: isDraft ? "saturate(.25) opacity(.78)" : isArchived ? "grayscale(.5) opacity(.85)" : "none"}}>
      <Poster seed={g.seed} bubbleSeed={g.author.seed} bubbleInitials={g.author.initials} steps={g.steps} progress={g.completion||0}/>
      {isDraft && (
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div className="px-3 py-1.5 rounded-md text-[11.5px] font-semibold tracking-wider uppercase" style={{background:"rgba(255,255,255,.92)", color:"var(--draft)", border:"1px dashed var(--draft)"}}>
            Draft · unpublished
          </div>
        </div>
      )}
    </div>

    <div className="p-4 flex-1 flex flex-col gap-3">
      <div className="flex items-start gap-2">
        <div className="flex-1 min-w-0">
          <div className="text-[14.5px] font-semibold truncate" style={{color: isDraft? "var(--text-2)":"var(--text)"}}>{g.title}</div>
          <div className="mt-1 flex items-center gap-2 text-[11.5px]" style={{color:"var(--text-3)"}}>
            <Bubble seed={g.author.seed} size={16} initials={g.author.initials}/>
            <span>{g.author.name}</span>
            <span>·</span>
            <span>{g.updated}</span>
          </div>
        </div>
        <StatusChip s={g.status} size="sm"/>
      </div>

      {isDraft ? (
        <div className="flex items-center justify-between p-2.5 rounded-md" style={{background:"#fff", border:"1px dashed var(--border-strong)"}}>
          <div className="text-[12px]" style={{color:"var(--text-2)"}}>Finish & publish to collect analytics</div>
          <button className="text-[12px] font-medium" style={{color:"var(--accent)"}}>Continue →</button>
        </div>
      ) : (
        <div>
          <div className="flex items-center justify-between text-[11.5px] mono mb-1.5" style={{color:"var(--text-3)"}}>
            <span>Completion</span>
            <span style={{color:"var(--text)",fontWeight:500}}>{g.completion}%</span>
          </div>
          <div className="h-1.5 rounded-full bg-zinc-100 overflow-hidden">
            <div className="h-full rounded-full" style={{width:`${g.completion}%`,background: g.completion>=70?"var(--pos)":g.completion>=50?"var(--draft)":"var(--neg)"}}/>
          </div>
        </div>
      )}

      <div className="flex items-center justify-between text-[12px]" style={{color:"var(--text-2)"}}>
        <div className="flex items-center gap-3">
          <span className="mono">{g.impressions} views</span>
          {g.feedback>0 && <span className="flex items-center gap-1">{I.feedback}<span className="mono">{g.feedback}</span></span>}
        </div>
        {g.drop && (
          <span className="chip" style={{background:"oklch(0.97 0.03 25)",color:"var(--neg)",fontSize:11}}>
            {I.warn}
            <span>Leaks at step {g.drop}</span>
          </span>
        )}
      </div>
    </div>
  </div>
  );
};

/* ---------- LIST ROW ---------- */
const ListRow = ({g, selected, onSelect}) => (
  <div className="grid grid-cols-[28px_minmax(0,2.4fr)_110px_70px_100px_1fr_90px_110px_90px_36px] gap-3 px-4 py-2.5 items-center border-b hairline last:border-0 hover:bg-[#FAFAFA] group cursor-pointer">
    <button onClick={(e)=>{e.stopPropagation();onSelect();}} className={"chk " + (selected?"on":"") + (selected?"":" opacity-0 group-hover:opacity-100")}>
      {selected && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="m5 12 5 5L20 7"/></svg>}
    </button>
    <div className="flex items-center gap-3 min-w-0">
      <div className="w-16 h-9 rounded-md overflow-hidden shrink-0 relative" style={{background:"linear-gradient(135deg,#F3E1BF 0%,#E5876B 100%)"}}>
        <div className="absolute inset-0" style={{background:`linear-gradient(135deg,${["#FDF7EC","#EEF3FB","#F3ECFB","#ECF7F1","#FBECEF","#FAF4E0","#F0F4F9","#F6F1EB"][g.seed%8]} 0%,${["#F3E1BF","#D8E4F4","#DDCEF0","#CDE5D7","#F2CDD5","#EADEA9","#D6DEE8","#E2D4C1"][g.seed%8]} 100%)`}}/>
        <div className="absolute bottom-0.5 right-0.5"><Bubble seed={g.author.seed} size={14} initials={g.author.initials}/></div>
        <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" style={{background:"rgba(0,0,0,.3)"}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div className="min-w-0">
        <div className="text-[13.5px] font-medium truncate">{g.title}</div>
        <div className="text-[11.5px] truncate" style={{color:"var(--text-3)"}}>{g.author.name}</div>
      </div>
    </div>
    <StatusChip s={g.status} size="sm"/>
    <div className="text-[13px] mono" style={{color:"var(--text-2)"}}>{g.steps}</div>
    <div className="text-[13px] mono" style={{color:"var(--text-2)"}}>{g.impressions}</div>
    <div>
      {g.completion!==null ? (
        <div className="flex items-center gap-2">
          <div className="flex-1 h-1.5 rounded-full bg-zinc-100 overflow-hidden max-w-[120px]">
            <div className="h-full rounded-full" style={{width:`${g.completion}%`,background: g.completion>=70?"var(--pos)":g.completion>=50?"var(--draft)":"var(--neg)"}}/>
          </div>
          <div className="mono text-[12.5px] w-10">{g.completion}%</div>
        </div>
      ) : <span className="mono text-[12px]" style={{color:"var(--text-3)"}}>—</span>}
    </div>
    <div>{g.drop ? <span className="chip" style={{background:"oklch(0.97 0.03 25)",color:"var(--neg)",fontSize:11}}>{I.warn}<span>Step {g.drop}</span></span> : <span className="mono text-[12px]" style={{color:"var(--text-3)"}}>—</span>}</div>
    <div className="text-[13px]" style={{color:"var(--text-2)"}}>{g.feedback>0 ? <span className="flex items-center gap-1">{I.feedback}<span className="mono">{g.feedback}</span></span> : <span className="mono text-[12px]" style={{color:"var(--text-3)"}}>—</span>}</div>
    <div className="text-[12.5px]" style={{color:"var(--text-2)"}}>{g.updated}</div>
    <button className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-white" style={{color:"var(--text-3)"}}>{I.dots}</button>
  </div>
);

/* ---------- KANBAN COLUMN ---------- */
const KanbanCard = ({g}) => (
  <div className="card overflow-hidden cursor-pointer hover:shadow-md transition-shadow">
    <div className="relative" style={{aspectRatio:"16/9",background:`linear-gradient(135deg,${["#FDF7EC","#EEF3FB","#F3ECFB","#ECF7F1","#FBECEF","#FAF4E0","#F0F4F9","#F6F1EB"][g.seed%8]} 0%,${["#F3E1BF","#D8E4F4","#DDCEF0","#CDE5D7","#F2CDD5","#EADEA9","#D6DEE8","#E2D4C1"][g.seed%8]} 100%)`}}>
      <div className="absolute bottom-2 right-2">
        <div className="rounded-full p-0.5" style={{background:"rgba(255,255,255,.9)"}}>
          <Bubble seed={g.author.seed} size={28} initials={g.author.initials}/>
        </div>
      </div>
      <div className="absolute top-2 left-2 px-1.5 py-0.5 rounded-full text-[10px] font-medium mono" style={{background:"rgba(255,255,255,.85)"}}>{g.steps} steps</div>
    </div>
    <div className="p-3">
      <div className="text-[13px] font-semibold truncate">{g.title}</div>
      <div className="mt-1 flex items-center justify-between text-[11.5px]" style={{color:"var(--text-3)"}}>
        <span>{g.updated}</span>
        {g.completion!==null ? <span className="mono" style={{color:"var(--text-2)"}}>{g.completion}%</span> : <span className="mono">—</span>}
      </div>
      {g.drop && <div className="mt-2 chip" style={{background:"oklch(0.97 0.03 25)",color:"var(--neg)",fontSize:11}}>{I.warn}<span>Step {g.drop}</span></div>}
    </div>
  </div>
);

const KanbanColumn = ({title, status, guides, dot}) => (
  <div className="flex flex-col gap-3 min-w-0">
    <div className="flex items-center justify-between px-1">
      <div className="flex items-center gap-2">
        <span className="dot" style={{background:dot}}/>
        <div className="text-[13px] font-semibold">{title}</div>
        <span className="mono text-[11.5px] px-1.5 rounded" style={{color:"var(--text-3)",background:"#fff",border:"1px solid var(--border)"}}>{guides.length}</span>
      </div>
      <button className="p-1 rounded hover:bg-white" style={{color:"var(--text-3)"}}>{I.plus}</button>
    </div>
    <div className="flex flex-col gap-3 p-2 rounded-xl" style={{background:"rgba(255,255,255,.5)",border:"1px dashed var(--border)"}}>
      {guides.map(g=><KanbanCard key={g.id} g={g}/>)}
      {guides.length===0 && <div className="text-[12px] italic py-6 text-center" style={{color:"var(--text-3)"}}>No guides in {title.toLowerCase()}.</div>}
    </div>
  </div>
);

/* ---------- EMPTY STATE ---------- */
const EmptyState = () => (
  <div className="card p-16 flex flex-col items-center text-center">
    <div className="relative mb-5">
      <div className="w-24 h-24 rounded-2xl" style={{background:"linear-gradient(135deg,#F3E1BF 0%,#E5876B 100%)"}}>
        <div className="absolute inset-3 rounded-xl bg-white/70"/>
      </div>
      <div className="absolute -bottom-2 -right-2 rounded-full p-1" style={{background:"#fff",boxShadow:"0 4px 14px rgba(0,0,0,.12)"}}>
        <Bubble seed={0} size={40} initials="AK"/>
      </div>
      <div className="absolute -top-1 right-3 w-5 h-5 rounded-full flex items-center justify-center" style={{background:"var(--accent)"}}>
        <span className="w-2 h-2 rounded-full bg-white rec-dot"/>
      </div>
    </div>
    <h3 className="text-[20px] font-semibold">Record your first guide</h3>
    <p className="text-[13.5px] mt-1.5 max-w-[380px]" style={{color:"var(--text-2)"}}>Open the Reveal Chrome extension, press record, and walk through your product. Your face appears as a bubble next to each step — new users get to meet you.</p>
    <div className="flex items-center gap-2 mt-5">
      <button className="btn btn-accent"><span>{I.record}</span>Record a guide</button>
      <button className="btn"><span>{I.upload}</span>Upload a video</button>
    </div>
    <div className="mt-6 text-[12px] mono" style={{color:"var(--text-3)"}}>Tip · Install the extension from the sidebar if you haven't yet.</div>
  </div>
);

/* ---------- TWEAKS PANEL ---------- */
const Tweaks = ({tweaks, setTweaks, onClose}) => {
  const Row = ({label, options, value, onChange}) => (
    <div>
      <div className="text-[11px] mono uppercase tracking-wider mb-1.5" style={{color:"var(--text-3)"}}>{label}</div>
      <div className="flex gap-1 p-0.5 rounded-lg border hairline bg-white text-[12px]">
        {options.map(o=>(
          <button key={o.v} onClick={()=>onChange(o.v)} className={"flex-1 px-2.5 py-1 rounded-md " + (value===o.v?"bg-zinc-900 text-white":"text-zinc-600 hover:bg-zinc-100")}>{o.l}</button>
        ))}
      </div>
    </div>
  );
  return (
    <div className="fixed bottom-5 right-5 w-[288px] card p-4 z-50" style={{boxShadow:"0 12px 40px rgba(0,0,0,.14)"}}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2"><span style={{color:"var(--accent)"}}>{I.sliders}</span><h4 className="text-[13.5px] font-semibold">Tweaks</h4></div>
        <button onClick={onClose} className="p-1 rounded hover:bg-zinc-100" style={{color:"var(--text-3)"}}>{I.close}</button>
      </div>
      <div className="flex flex-col gap-3">
        <Row label="Layout" value={tweaks.view} onChange={v=>setTweaks({...tweaks,view:v})} options={[{v:"gallery",l:"Gallery"},{v:"list",l:"List"}]}/>
        <Row label="Density" value={tweaks.density} onChange={v=>setTweaks({...tweaks,density:v})} options={[{v:"comfortable",l:"Comfy"},{v:"compact",l:"Compact"}]}/>
        <Row label="Show drop-off" value={tweaks.showDrop?"on":"off"} onChange={v=>setTweaks({...tweaks,showDrop:v==="on"})} options={[{v:"on",l:"On"},{v:"off",l:"Off"}]}/>
        <Row label="State" value={tweaks.state} onChange={v=>setTweaks({...tweaks,state:v})} options={[{v:"full",l:"With data"},{v:"empty",l:"Empty"}]}/>
      </div>
    </div>
  );
};

/* ---------- MAIN PAGE ---------- */
const App = () => {
  const [tab,setTab] = useState("all");
  const [view,setView] = useState("gallery"); // gallery | list | kanban
  const [selected,setSelected] = useState(new Set());
  const [perfFilter,setPerfFilter] = useState("any"); // any | high | low
  const [feedbackOnly,setFeedbackOnly] = useState(false);
  const [tweaksOpen,setTweaksOpen] = useState(false);
  const [tweaks,setTweaks] = useState({view:"gallery",density:"comfortable",showDrop:true,state:"full"});
  const effectiveView = tweaks.view; // tweaks overrides
  const effectiveState = tweaks.state;

  const counts = useMemo(()=>({
    all: guidesData.length,
    published: guidesData.filter(g=>g.status==="published").length,
    draft: guidesData.filter(g=>g.status==="draft").length,
    archived: guidesData.filter(g=>g.status==="archived").length,
  }),[]);

  const filtered = useMemo(()=>{
    let list = guidesData;
    if(tab!=="all") list = list.filter(g=>g.status===tab);
    if(perfFilter==="high") list = list.filter(g=>g.completion!==null && g.completion>=70);
    if(perfFilter==="low")  list = list.filter(g=>g.completion!==null && g.completion<50);
    if(feedbackOnly) list = list.filter(g=>g.feedback>0 || g.drop);
    return list;
  },[tab,perfFilter,feedbackOnly]);

  const toggleSelect = (id) => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  };
  const clearSelect = ()=>setSelected(new Set());

  const showEmpty = effectiveState==="empty";

  return (
    <div className="min-h-screen flex">
      <Sidebar/>
      <main className="flex-1 min-w-0 py-6 pr-6">
        <div className="max-w-[1240px] mx-auto px-6 flex flex-col gap-5">

          {/* HEADER */}
          <div className="flex items-start justify-between">
            <div>
              <div className="flex items-center gap-2">
                <h1 className="text-[28px] font-semibold num-tight">Guides</h1>
                <span className="chip" style={{background:"#F4F4F5",color:"var(--text-2)"}}>{counts.all} total</span>
              </div>
              <div className="text-[13.5px] mt-1" style={{color:"var(--text-2)"}}>
                Everything you've recorded across your workspace. Click a guide to see analytics, edits happen in the Chrome extension.
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={()=>setTweaksOpen(true)} className="btn"><span style={{color:"var(--text-3)"}}>{I.sliders}</span>Tweaks</button>
              <button className="btn"><span>{I.upload}</span>Upload video</button>
              <button className="btn btn-accent"><span>{I.record}</span>Record new guide</button>
            </div>
          </div>

          {/* TAB + FILTER BAR */}
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-1 p-1 rounded-lg" style={{background:"#ECECF0"}}>
              {[
                {id:"all",l:"All",c:counts.all},
                {id:"published",l:"Published",c:counts.published,dot:"var(--pos)"},
                {id:"draft",l:"Drafts",c:counts.draft,dot:"var(--draft)"},
                {id:"archived",l:"Archived",c:counts.archived,dot:"var(--text-3)"},
              ].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} className={"tab " + (tab===t.id?"active":"")}>
                  {t.dot && <span className="dot" style={{background:t.dot}}/>}
                  <span>{t.l}</span>
                  <span className="mono" style={{color:"var(--text-3)",fontSize:11}}>{t.c}</span>
                </button>
              ))}
            </div>

            <div className="flex items-center gap-2">
              <div className="relative h-9">
                <span className="absolute left-2.5 top-1/2 -translate-y-1/2" style={{color:"var(--text-3)"}}>{I.search}</span>
                <input placeholder="Search by title or author…" className="h-9 bg-white border hairline rounded-lg pl-8 pr-3 text-[13px] outline-none focus:border-zinc-400 w-[240px]"/>
              </div>

              <div className="h-9 flex items-center gap-1 p-1 rounded-lg border hairline bg-white text-[12px]">
                {[{v:"any",l:"Any performance"},{v:"high",l:"High"},{v:"low",l:"Low"}].map(o=>(
                  <button key={o.v} onClick={()=>setPerfFilter(o.v)} className={"h-full px-2.5 rounded-md " + (perfFilter===o.v?"bg-zinc-900 text-white":"text-zinc-600 hover:bg-zinc-100")}>{o.l}</button>
                ))}
              </div>

              <button onClick={()=>setFeedbackOnly(!feedbackOnly)} className={"btn h-9 " + (feedbackOnly?"btn-primary":"")}>
                {I.feedback}<span>Has feedback / issues</span>
              </button>

              <div className="w-px h-6 bg-zinc-200"/>

              <div className="h-9 flex p-1 rounded-lg border hairline bg-white">
                <button onClick={()=>setTweaks({...tweaks,view:"gallery"})} className={"h-full px-2 rounded-md flex items-center " + (effectiveView==="gallery"?"bg-zinc-900 text-white":"text-zinc-600")} title="Gallery">{I.grid}</button>
                <button onClick={()=>setTweaks({...tweaks,view:"list"})} className={"h-full px-2 rounded-md flex items-center " + (effectiveView==="list"?"bg-zinc-900 text-white":"text-zinc-600")} title="List">{I.list}</button>
              </div>
            </div>
          </div>

          {/* SELECTION BAR */}
          {selected.size>0 && (
            <div className="card px-4 py-2.5 flex items-center gap-3 sticky top-3 z-20" style={{borderColor:"var(--text)"}}>
              <div className="chk on"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="m5 12 5 5L20 7"/></svg></div>
              <div className="text-[13px] font-medium">{selected.size} selected</div>
              <button onClick={clearSelect} className="text-[12.5px]" style={{color:"var(--text-2)"}}>Clear</button>
              <div className="flex-1"/>
              <button className="btn">{I.archive}<span>Archive</span></button>
              <button className="btn" style={{color:"var(--neg)",borderColor:"oklch(0.9 0.08 25)"}}>{I.trash}<span>Delete</span></button>
            </div>
          )}

          {/* CONTENT */}
          {showEmpty ? <EmptyState/> : (
            <>
              {effectiveView==="gallery" && (
                <div className={"grid gap-4 " + (tweaks.density==="compact" ? "grid-cols-4" : "grid-cols-3")}>
                  {filtered.map(g=>(
                    <GalleryCard key={g.id} g={{...g, drop: tweaks.showDrop? g.drop: null}} selected={selected.has(g.id)} onSelect={()=>toggleSelect(g.id)}/>
                  ))}
                </div>
              )}

              {effectiveView==="list" && (
                <div className="card">
                  <div className="grid grid-cols-[28px_minmax(0,2.4fr)_110px_70px_100px_1fr_90px_110px_90px_36px] gap-3 px-4 py-2.5 text-[10.5px] mono uppercase tracking-wider border-b hairline" style={{color:"var(--text-3)",background:"#FAFAFA"}}>
                    <div/>
                    <div>Guide</div>
                    <div>Status</div>
                    <div>Steps</div>
                    <div>Views</div>
                    <div>Completion</div>
                    <div>Drop-off</div>
                    <div>Feedback</div>
                    <div>Updated</div>
                    <div/>
                  </div>
                  {filtered.map(g=>(
                    <ListRow key={g.id} g={{...g, drop: tweaks.showDrop? g.drop: null}} selected={selected.has(g.id)} onSelect={()=>toggleSelect(g.id)}/>
                  ))}
                  {filtered.length===0 && <div className="py-16 text-center text-[13px]" style={{color:"var(--text-3)"}}>No guides match these filters.</div>}
                </div>
              )}

              {false && (
                <div className="grid grid-cols-3 gap-4">
                  <KanbanColumn title="Published" status="published" dot="var(--pos)" guides={filtered.filter(g=>g.status==="published")}/>
                  <KanbanColumn title="Drafts" status="draft" dot="var(--draft)" guides={filtered.filter(g=>g.status==="draft")}/>
                  <KanbanColumn title="Archived" status="archived" dot="var(--text-3)" guides={filtered.filter(g=>g.status==="archived")}/>
                </div>
              )}

              {/* FOOTER COUNT */}
              <div className="flex items-center justify-between pt-1 pb-6 text-[11.5px] mono" style={{color:"var(--text-3)"}}>
                <div>Showing {filtered.length} of {counts.all} guides</div>
                <div className="flex items-center gap-3">
                  <span className="flex items-center gap-1.5"><span className="dot" style={{background:"var(--pos)"}}/>{counts.published} published</span>
                  <span className="flex items-center gap-1.5"><span className="dot" style={{background:"var(--draft)"}}/>{counts.draft} drafts</span>
                  <span className="flex items-center gap-1.5"><span className="dot" style={{background:"var(--text-3)"}}/>{counts.archived} archived</span>
                </div>
              </div>
            </>
          )}
        </div>
      </main>

      {tweaksOpen && <Tweaks tweaks={tweaks} setTweaks={setTweaks} onClose={()=>setTweaksOpen(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
