<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{--bg:#F4F4F5;--card:#FFFFFF;--border:#E8E8EB;--border-strong:#DCDCE0;--text:#18181B;--text-2:#52525B;--text-3:#A1A1AA;--accent:oklch(0.64 0.18 28);--accent-soft:oklch(0.96 0.04 28);--pos:oklch(0.64 0.14 150);--neg:oklch(0.62 0.17 25);--draft:oklch(0.65 0.12 75);}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-feature-settings:"cv11","ss01";}
.mono{font-feature-settings:"tnum","ss01";}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 0 rgba(24,24,27,.02),0 1px 2px rgba(24,24,27,.04);}
.hairline{border-color:var(--border);}
.chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:999px;display:inline-block;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;white-space:nowrap;cursor:pointer;}
.btn:hover{background:#FAFAFA;border-color:var(--border-strong);}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);} .btn-primary:hover{background:#000;}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);} .btn-accent:hover{filter:brightness(.96);}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13.5px;color:var(--text-2);font-weight:500;cursor:pointer;transition:all .12s;}
.nav-item:hover{background:#F4F4F5;color:var(--text);} .nav-item.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(24,24,27,.06);border:1px solid var(--border);}
.tab{padding:8px 12px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;border-bottom:2px solid transparent;}
.tab.active{color:var(--text);border-color:var(--text);}
.num-tight{letter-spacing:-.02em;}
.mock-code{font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.6;}
.switch{width:32px;height:18px;border-radius:999px;background:#D4D4D8;position:relative;transition:.15s;flex-shrink:0;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:999px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.switch.on{background:var(--text);} .switch.on::after{left:16px;}
@keyframes pulseRec{0%,100%{opacity:1;}50%{opacity:.4;}} .rec-dot{animation:pulseRec 1.4s ease-in-out infinite;}
::-webkit-scrollbar{width:10px;height:10px;} ::-webkit-scrollbar-thumb{background:#D4D4D8;border-radius:10px;border:2px solid var(--bg);}
.radio{width:16px;height:16px;border:1.5px solid #C4C4C8;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.radio.on{border-color:var(--text);} .radio.on::after{content:"";width:8px;height:8px;background:var(--text);border-radius:999px;}
</style>
</head>
<body>
<div id="root"></div>

  link:<Icon d={<><path d="M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></>} size={14}/>,

  clock:<Icon d={<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>} size={14}/>,

const Bubble = ({seed=0,size=32,initials,live})=>{
  const palettes=[["#F4C89A","#E5876B"],["#B8D4E3","#6B8FA6"],["#D4C5E8","#8B72B8"],["#9AD4B8","#5A9E7C"],["#F0B8C4","#C96B84"],["#E8D79C","#B89A4E"],["#C4D4E8","#7A8FA6"],["#D8C4A8","#9E7E5A"]];
  const [a,b]=palettes[seed%palettes.length]; const id=`bb${seed}-${size}`;
  return(<div className="relative inline-block" style={{width:size,height:size}}>
    <svg width={size} height={size} viewBox="0 0 40 40" className="rounded-full block">
      <defs><radialGradient id={id} cx=".4" cy=".35" r=".8"><stop offset="0" stopColor={a}/><stop offset="1" stopColor={b}/></radialGradient></defs>
      <circle cx="20" cy="20" r="20" fill={`url(#${id})`}/>
      <circle cx="20" cy="16" r="5.2" fill="rgba(255,255,255,.45)"/>
      <path d="M9 34c2-5 6-7.5 11-7.5S29 29 31 34" fill="rgba(255,255,255,.45)"/>
      {initials && <text x="20" y="23" textAnchor="middle" fontFamily="Inter" fontWeight="600" fontSize="11" fill="rgba(24,24,27,.55)">{initials}</text>}
    </svg>
    {live && <span className="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full" style={{background:"var(--accent)",boxShadow:"0 0 0 2px #fff"}}/>}
  </div>);
};

const Face = ({kind="happy",size=18})=>{
  const colors={sad:"#E4B341",neutral:"#C4C4C8",happy:"#74C69D",love:"#E5766C"}; const c=colors[kind];
  return(<svg width={size} height={size} viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill={c} fillOpacity=".18" stroke={c} strokeWidth="1.5"/>
    {kind==="sad"&&<><circle cx="9" cy="10" r="1" fill={c}/><circle cx="15" cy="10" r="1" fill={c}/><path d="M8.5 16c1-1.2 2.2-1.8 3.5-1.8s2.5.6 3.5 1.8" stroke={c} strokeWidth="1.5" fill="none" strokeLinecap="round"/></>}
    {kind==="neutral"&&<><circle cx="9" cy="10" r="1" fill={c}/><circle cx="15" cy="10" r="1" fill={c}/><path d="M9 15h6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></>}
    {kind==="happy"&&<><circle cx="9" cy="10" r="1" fill={c}/><circle cx="15" cy="10" r="1" fill={c}/><path d="M8.5 14c1 1.2 2.2 1.8 3.5 1.8s2.5-.6 3.5-1.8" stroke={c} strokeWidth="1.5" fill="none" strokeLinecap="round"/></>}
    {kind==="love"&&<><path d="M7.5 9.5c0-1 .8-1.8 1.8-1.8.7 0 1.2.4 1.5.9.3-.5.8-.9 1.5-.9 1 0 1.8.8 1.8 1.8 0 1.6-2.3 3-3.3 3.5-1-.5-3.3-1.9-3.3-3.5z" fill={c}/><path d="M8 14c1 1 2.5 1.6 4 1.6s3-.6 4-1.6" stroke={c} strokeWidth="1.5" fill="none" strokeLinecap="round"/></>}
  </svg>);
};

/* ---------- SECTION TABS ---------- */
const Tabs = ({active, setActive})=>(
  <div className="flex items-center border-b hairline sticky top-0 z-20 -mx-6 px-6" style={{background:"var(--bg)"}}>
    {[

/* ---------- ANALYTICS ---------- */
const Kpi = ({label,value,sub,delta,deltaKind,icon})=>(
  <div className="card p-4">
    <div className="flex items-center justify-between">
      <div className="flex items-center gap-1.5 text-[11px] mono uppercase tracking-wider" style={{color:"var(--text-3)"}}>{icon}{label}</div>

    <div className="flex items-end gap-2 mt-2">

      {sub && <div className="text-[12px] pb-0.5" style={{color:"var(--text-3)"}}>{sub}</div>}
    </div>
    {delta && <div className="mt-2 chip" style={{background: deltaKind==="pos"?"oklch(0.96 0.05 150)":"oklch(0.96 0.04 25)", color: deltaKind==="pos"?"var(--pos)":"var(--neg)"}}>
      <span className="mono">{delta}</span>

const StepFunnel = ()=>{
  const steps=[
    {n:1,l:"Welcome · founder intro",v:100,drop:0},
    {n:2,l:"Create your workspace",v:92,drop:8},

        </Field>

        <Field label="Frequency cap" hint="How often can the same user see this guide?">
          <div className="flex gap-1 p-1 rounded-lg border hairline bg-white text-[12.5px] w-fit">
            {[{v:"once",l:"Once"},{v:"daily",l:"Once per day"},{v:"weekly",l:"Once per week"},{v:"unlimited",l:"Unlimited"}].map(o=>(
              <button key={o.v} onClick={()=>setFrequency(o.v)} className={"px-3 py-1.5 rounded-md " + (frequency===o.v?"bg-zinc-900 text-white":"text-zinc-600 hover:bg-zinc-100")}>{o.l}</button>
            ))}
          </div>
        </Field>

        <Field label="Feedback screen" hint="Ask for a rating and optional comment at the end.">
          <div className="flex items-center gap-3">
            <div onClick={()=>setShowFeedback(!showFeedback)} className={"switch " + (showFeedback?"on":"")}/>
            <div className="text-[13px]">{showFeedback ? "Shown after final step" : "Off — guide ends silently"}</div>
          </div>
          {showFeedback && (
            <div className="mt-3 p-3 rounded-lg border hairline flex items-center justify-center gap-3" style={{background:"#FAFAFA"}}>
              <Face kind="sad" size={26}/>
              <Face kind="neutral" size={26}/>
              <Face kind="happy" size={26}/>
              <Face kind="love" size={26}/>
              <span className="ml-3 text-[12px]" style={{color:"var(--text-3)"}}>+ optional comment</span>
            </div>
          )}
        </Field>
      </div>
    </div>
  );
};

/* ---------- OVERVIEW V4: TIMELINE / JOURNEY ---------- */
const OverviewV4 = ()=>{
  const W = 1160, H = 220, pad = 40;
  const xs = STEPS.map((s,i)=> pad + (i*(W-pad*2))/(STEPS.length-1));
  const ys = STEPS.map(s => pad + (H-pad*2) * (1 - s.completion/100));
  const path = xs.map((x,i)=> `${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
  const area = `M ${xs[0]} ${H-pad} ` + xs.map((x,i)=> `L ${x} ${ys[i]}`).join(" ") + ` L ${xs[xs.length-1]} ${H-pad} Z`;
  return (
    <div className="flex flex-col gap-5">
      <div className="grid grid-cols-5 gap-4">
        <Kpi label="Impressions" value="12,480" delta="+12.4%" deltaKind="pos" icon={I.eye}/>
        <Kpi label="Starts" value="4,210" delta="+8.1%" deltaKind="pos" icon={I.play}/>
        <Kpi label="Completion" value="78%" delta="+2.1pp" deltaKind="pos" icon={I.flag}/>
        <Kpi label="Avg. watch" value="2:14" sub="/ 2:48" delta="+0:08" deltaKind="pos" icon={I.clock}/>
        <Kpi label="Avg. rating" value="4.7" sub="/ 5.0" delta="+0.2" deltaKind="pos" icon={I.sparkle}/>
      </div>
      <div className="card p-5">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h3 className="text-[15px] font-semibold">User journey</h3>
            <div className="text-[12.5px]" style={{color:"var(--text-2)"}}>Completion curve across all 8 steps. Red markers = drop-off spikes.</div>
          </div>
          <button className="btn btn-accent">{I.extOpen}<span>Open in Editor</span></button>
        </div>
        <div className="relative" style={{height:H}}>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="block">
            <defs>
              <linearGradient id="jArea" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stopColor="oklch(0.64 0.18 28)" stopOpacity=".22"/>
                <stop offset="1" stopColor="oklch(0.64 0.18 28)" stopOpacity="0"/>
              </linearGradient>
            </defs>
            {[0,25,50,75,100].map(v=>{
              const y = pad + (H-pad*2)*(1-v/100);
              return <g key={v}><line x1={pad} x2={W-pad} y1={y} y2={y} stroke="#E8E8EB" strokeDasharray="3 4"/><text x={8} y={y+3} fontSize="10" fill="#A1A1AA" fontFamily="ui-monospace">{v}%</text></g>;
            })}
            <path d={area} fill="url(#jArea)"/>
            <path d={path} fill="none" stroke="var(--accent)" strokeWidth="2.5"/>
            {STEPS.map((s,i)=>(
              <g key={s.n}>
                <circle cx={xs[i]} cy={ys[i]} r="5" fill="#fff" stroke="var(--accent)" strokeWidth="2.5"/>
                {s.drop>=5 && <circle cx={xs[i]} cy={ys[i]} r="10" fill="none" stroke="var(--neg)" strokeWidth="1.5" strokeDasharray="3 3"/>}
              </g>
            ))}
          </svg>
        </div>
        <div className="mt-3 grid gap-2" style={{gridTemplateColumns:`repeat(${STEPS.length}, minmax(0,1fr))`}}>
          {STEPS.map(s=>(
            <div key={s.n} className="p-2.5 rounded-lg border hairline group cursor-pointer hover:border-zinc-400 transition" style={{background:"#FAFAFA"}}>
              <div className="flex items-center justify-between">

                <div className="text-[11.5px] font-semibold mono" style={{color:completionColor(s.completion)}}>{s.completion}%</div>

              {s.drop>=5 && <div className="mt-1 flex items-center gap-1 text-[10.5px]" style={{color:"var(--neg)"}}>{I.warn}<span>−{s.drop}%</span></div>}
              <button className="btn w-full justify-center mt-2 text-[11px] py-1 opacity-0 group-hover:opacity-100">{I.extOpen}<span>Edit</span></button>
            </div>
          ))}

const App = ()=>{
  const [active,setActive] = useState("overview");
  const [published,setPublished] = useState(true);
  const [embedEnabled,setEmbedEnabled] = useState(true);
  const [detection,setDetection] = useState("detected");
  const [layout,setLayoutState] = useState(TWEAK_DEFAULTS.overviewLayout || "classic");
  const [tweaksOpen,setTweaksOpen] = useState(false);

  React.useEffect(()=>{
    const handler = (e)=>{
      const d = e.data;
      if(!d || typeof d!=="object") return;
      if(d.type==="__activate_edit_mode") setTweaksOpen(true);
      if(d.type==="__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    try{ window.parent.postMessage({type:"__edit_mode_available"}, "*"); }catch(e){}
    return ()=> window.removeEventListener("message", handler);
  },[]);

  const setLayout = (v)=>{
    setLayoutState(v);
    try{ window.parent.postMessage({type:"__edit_mode_set_keys", edits:{overviewLayout:v}}, "*"); }catch(e){}
  };
  return (
    <div className="min-h-screen flex">
      <Sidebar/>
      <main className="flex-1 min-w-0 py-6 pr-6">
        <div className="max-w-[1240px] mx-auto px-6 flex flex-col gap-5">
          <div className="flex items-center gap-2 -mb-1">
            <a href="Guides.html" className="btn"><span>{I.back}</span>Back</a>
            <div className="text-[12.5px]" style={{color:"var(--text-3)"}}>Saved 2m ago · auto-syncs with extension</div>
          </div>

          <Hero published={published} setPublished={setPublished}/>

          <Tabs active={active} setActive={setActive}/>

          {active==="overview" && layout==="classic" && <OverviewV1/>}
          {active==="overview" && layout==="funnel" && <OverviewV2/>}
          {active==="overview" && layout==="narrative" && <OverviewV3/>}
          {active==="overview" && layout==="journey" && <OverviewV4/>}

          {active==="embed" && (
            <div className="flex flex-col gap-5">
              <PixelSection embedEnabled={embedEnabled} setEmbedEnabled={setEmbedEnabled} detection={detection} setDetection={setDetection}/>
              <RevealButtonSection/>
              <DynamicLinkSection/>
            </div>
          )}

          {active==="behavior" && <BehaviorPanel/>}

          <div className="pt-2 pb-8 text-[11.5px] mono flex items-center justify-between" style={{color:"var(--text-3)"}}>
            <div>Guide ID · gd_8f4e_a1c0_welcome</div>
            <div className="flex items-center gap-3">
              <span className="flex items-center gap-1.5"><span className="dot" style={{background:"var(--pos)"}}/>Extension connected</span>
              <span>Last edited 2h ago in Chrome</span>
            </div>
          </div>
        </div>
      </main>
      <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} layout={layout} setLayout={setLayout}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
